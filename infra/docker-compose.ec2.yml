# Single-EC2 MVP stack: Postgres, Redis, Keycloak, MinIO, Caddy reverse proxy.
# API/worker services are commented until application images exist.
#
# Usage on EC2 (trial / low RAM — default):
#   cp .env.example .env   # edit values
#   bash scripts/setup-swap.sh   # recommended on instances with < 4GB RAM
#   docker compose -f docker-compose.ec2.yml up -d
#
# Production-like Keycloak (needs more RAM):
#   docker compose -f docker-compose.ec2.yml -f docker-compose.ec2.prod.yml up -d
#
# See docs/deployment-ec2-keycloak.md

name: construction-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=80
    deploy:
      resources:
        limits:
          memory: 384M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      KEYCLOAK_DB: ${KEYCLOAK_DB}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-keycloak-db.sh:/docker-entrypoint-initdb.d/01-init-keycloak-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 96mb
      - --maxmemory-policy
      - allkeys-lru
    deploy:
      resources:
        limits:
          memory: 128M
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # Cap JVM heap on small instances (start-dev mode)
      JAVA_OPTS_APPEND: "-Xms128m -Xmx512m"
    # start-dev skips the heavy "build server image" step that OOMs on t2.micro/t3.small
    command: start-dev --import-realm
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 180s
    networks:
      - internal

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    profiles: ["full"]
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Creates default bucket on first run (optional helper)
  minio-init:
    image: minio/mc:latest
    profiles: ["full"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${S3_BUCKET} || true &&
      exit 0
      "
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - keycloak
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
      - edge

  # Uncomment when NestJS API image is available (build from apps/api)
  # api:
  #   build:
  #     context: ../apps/api
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     keycloak:
  #       condition: service_healthy
  #   environment:
  #     NODE_ENV: production
  #     DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  #     REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
  #     KEYCLOAK_ISSUER: ${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM}
  #     KEYCLOAK_JWKS_URI: ${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
  #     S3_ENDPOINT: http://minio:9000
  #     S3_BUCKET: ${S3_BUCKET}
  #     S3_ACCESS_KEY: ${MINIO_ROOT_USER}
  #     S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  #   networks:
  #     - internal

  # worker:
  #   build:
  #     context: ../apps/api
  #     dockerfile: Dockerfile.worker
  #   restart: unless-stopped
  #   depends_on:
  #     - api
  #   environment:
  #     NODE_ENV: production
  #     DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  #     REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
  #   networks:
  #     - internal

networks:
  edge:
  internal:

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
  minio_data:
  caddy_data:
  caddy_config:
