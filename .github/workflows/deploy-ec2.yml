name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/api/**'
      - 'infra/**'
      - '.github/workflows/deploy-ec2.yml'

  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            REPO_DIR="${REPO_DIR:-$HOME/construction-platform}"
            export REPO_DIR
            export DEPLOY_BRANCH="${{ github.ref_name }}"
            bash "$REPO_DIR/infra/scripts/deploy.sh"

      - name: Verify public health endpoint
        run: |
          URL="${{ secrets.EC2_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            echo "EC2_HEALTH_URL not set — skipping external check"
            exit 0
          fi
          for i in 1 2 3 4 5; do
            if curl -sf "$URL" | grep -q '"status":"ok"'; then
              echo "Health OK: $URL"
              exit 0
            fi
            echo "Waiting for API... ($i/5)"
            sleep 5
          done
          echo "Health check failed: $URL"
          exit 1
