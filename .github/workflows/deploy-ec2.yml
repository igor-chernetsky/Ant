name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/api/**'
      - 'infra/**'
      - '.github/workflows/deploy-ec2.yml'

  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            REPO_DIR="${REPO_DIR:-$HOME/construction-platform}"
            export REPO_DIR
            export DEPLOY_BRANCH="${{ github.ref_name }}"
            bash "$REPO_DIR/infra/scripts/deploy.sh"

      - name: Verify public health endpoint (optional)
        continue-on-error: true
        timeout-minutes: 2
        run: |
          URL="${{ secrets.EC2_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            echo "EC2_HEALTH_URL not set — skipping external check"
            exit 0
          fi
          echo "Checking $URL from GitHub runner (may fail if SG blocks unknown IPs)"
          for i in 1 2 3 4 5; do
            if curl -sf --connect-timeout 5 --max-time 10 "$URL" | grep -q '"status":"ok"'; then
              echo "Public health OK: $URL"
              exit 0
            fi
            echo "Retry $i/5..."
            sleep 3
          done
          echo "::warning::Public health check failed from GitHub runner. Deploy may still be OK — verify on EC2: curl http://127.0.0.1/api/health"
          exit 1
