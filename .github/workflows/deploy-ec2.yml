name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/api/**'
      - 'infra/**'
      - '.github/workflows/deploy-ec2.yml'

  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API to EC2
    runs-on: ubuntu-latest
    # docker compose build on small EC2 often takes 5–15 minutes
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          command_timeout: 25m
          script: |
            set -euo pipefail
            REPO_DIR="${REPO_DIR:-$HOME/construction-platform}"
            export REPO_DIR
            export DEPLOY_BRANCH="${{ github.ref_name }}"
            bash "$REPO_DIR/infra/scripts/deploy.sh"
